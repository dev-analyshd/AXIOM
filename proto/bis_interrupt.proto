// AXIOM Protocol Buffers — Behavioral Interrupt System (BIS)
//
// Proto3 definition for BIS interrupt messages.
// BIS replaces hardware interrupt lines with behavioral anomaly detection.
//
// Interrupt Levels:
//   L1 (TRAJ ≥ 1σ): Informational — log to Akashic Index
//   L2 (TRAJ ≥ 2σ): Warning — alert coherence engine
//   L3 (TRAJ ≥ 3σ): Critical — invoke IKP INNATE_LAYER
//   L4 (TRAJ ≥ 5σ): Emergency — SILENCE entity immediately
//
// Author: Hudu Yusuf (Analys), @The_analys
// License: CC0 1.0 Universal

syntax = "proto3";

package axiom.v1;

import "ubh.proto";

option go_package = "github.com/dev-analyshd/TRION-Protocol/AXIOM/axiom-rcp/proto";
option java_package = "io.axiom.v1";
option java_outer_classname = "BISProto";

// ============================================================================
// BIS INTERRUPT LEVEL ENUM
// ============================================================================

enum BISLevel {
    BIS_NORMAL = 0;  // TRAJ < 1σ — no interrupt
    BIS_L1     = 1;  // TRAJ ≥ 1σ — informational, log to Akashic Index
    BIS_L2     = 2;  // TRAJ ≥ 2σ — warning, alert coherence engine
    BIS_L3     = 3;  // TRAJ ≥ 3σ — critical, invoke IKP INNATE_LAYER
    BIS_L4     = 4;  // TRAJ ≥ 5σ — emergency, SILENCE entity immediately
}

// ============================================================================
// BIS INTERRUPT MESSAGE
//
// Generated by the Living Kernel (L5) whenever TRAJ(entity, t) ≥ 1σ.
// Carries full behavioral context for diagnosis (§7.9).
// ============================================================================

message BISInterrupt {
    // Entity identity
    bytes    entity_bpi         = 1;   // 32-byte BPI of the interrupted entity

    // Trajectory anomaly
    float    traj_score         = 2;   // TRAJ(entity, t) in sigma units
    BISLevel level              = 3;   // Classified interrupt level
    float    baseline_sigma     = 4;   // σ used for classification

    // Anomaly context
    repeated UBEType anomaly_sequence  = 5;  // Observed anomalous UBE sequence
    repeated UBEType expected_sequence = 6;  // Expected UBE sequence from trajectory model

    // State at interrupt time
    float  bc_at_interrupt    = 7;   // BC(entity, t) at interrupt
    double depth_at_interrupt = 8;   // D(entity, t) at interrupt
    float  psi_at_interrupt   = 9;   // Ψ(entity, t) at interrupt

    // Temporal anchoring
    uint64 gps_timestamp     = 10;   // GPS nanoseconds at interrupt
    bytes  causal_context    = 11;   // 32-byte causal context hash

    // IKP response triggered (if any)
    uint32 ikp_layer_invoked = 12;   // 0=none, 1=INNATE, 2=ADAPTIVE, 3=CRISPR, 4=MEMORY

    // Diagnosis payload (from BIS handler, §7.9)
    bytes  diagnosis_payload = 13;   // Serialized diagnosis data
}

// ============================================================================
// BIS SERVICE (part of AXIOMNode service in ubh.proto)
//
// These RPCs handle BIS interrupt reporting and subscription.
// ============================================================================

// Request to acknowledge and handle a BIS interrupt
message BISHandleRequest {
    bytes    entity_bpi  = 1;
    BISLevel level       = 2;
    bytes    interrupt_id = 3;  // Blake3 hash of the BISInterrupt for dedup
}

message BISHandleResponse {
    bool   handled         = 1;
    uint32 ikp_layer_used  = 2;  // IKP layer that handled it
    bool   entity_silenced = 3;  // True if SILENCE was engaged
    string action_taken    = 4;  // Human-readable description
}

// Subscribe to BIS interrupts for an entity (server-streaming)
message BISSubscribeRequest {
    bytes    entity_bpi   = 1;
    BISLevel min_level    = 2;   // Minimum level to subscribe to (default L1)
}

// ============================================================================
// BIS STATISTICS
// ============================================================================

message BISStatsRequest {
    bytes entity_bpi = 1;
}

message BISStatsResponse {
    bytes  entity_bpi         = 1;
    uint64 total_interrupts   = 2;
    uint64 l1_count           = 3;
    uint64 l2_count           = 4;
    uint64 l3_count           = 5;
    uint64 l4_count           = 6;
    float  avg_traj_score     = 7;
    float  current_bc         = 8;
    bool   currently_silenced = 9;
}

// ============================================================================
// BIS INTERRUPT HISTORY
// ============================================================================

message BISHistoryRequest {
    bytes  entity_bpi  = 1;
    uint64 from_ns     = 2;
    uint64 to_ns       = 3;
    uint32 max_results = 4;
}

message BISHistoryResponse {
    repeated BISInterrupt interrupts = 1;
    uint64 total_count = 2;
}
